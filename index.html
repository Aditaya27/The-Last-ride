<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Bike Racing</title>
    <style>
        /* CSS & Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #2c3e50; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; background: #55a630; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        /* UI Overlays */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.85); transition: opacity 0.5s ease; z-index: 20; }
        .hidden { opacity: 0; pointer-events: none !important; display: none !important; }
        
        h1 { color: #f1c40f; font-size: 3rem; margin-bottom: 5px; text-transform: uppercase; text-align: center;}
        h2 { color: #ecf0f1; font-size: 1.2rem; margin-bottom: 25px; }
        .score-text { color: #fff; font-size: 1.2rem; margin: 5px 0; }
        
        button.action-btn { background: #e74c3c; color: white; border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 30px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s; margin-top: 15px; width: 260px;}
        button.action-btn:active { transform: scale(0.95); }
        button.menu-btn { background: #34495e; }

        .settings { margin-top: 20px; background: rgba(255,255,255,0.1); padding: 15px 30px; border-radius: 15px; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; width: 260px; margin: 15px 0; color: #fff; font-size: 1.2rem;}
        
        /* Switch Toggle */
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Volume Slider */
        .vol-slider { -webkit-appearance: none; width: 120px; height: 8px; border-radius: 5px; background: #ccc; outline: none; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #f1c40f; cursor: pointer; }

        .control-icon { display: flex; align-items: center; justify-content: center; width: 60px; height: 30px; color: #f1c40f; font-weight: bold; font-size: 1.5rem; letter-spacing: 5px;}

        /* HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #score-board { position: absolute; top: 20px; right: 20px; text-align: right; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #score-board .current { font-size: 2rem; font-weight: bold; color: #f1c40f; }
        #score-board .high { font-size: 1rem; color: #bdc3c7; }

        /* Pause Button */
        #btn-pause { position: absolute; top: 20px; left: 20px; width: 45px; height: 45px; background: rgba(0,0,0,0.6); border: 2px solid #ecf0f1; border-radius: 50%; color: white; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; pointer-events: auto; cursor: pointer; text-shadow: 1px 1px 2px #000; box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 10;}
        #btn-pause:active { transform: scale(0.9); }

        /* Speedometer */
        #speedometer { position: absolute; top: 20px; left: calc(50% - 50px); width: 100px; height: 100px; background: rgba(0,0,0,0.6); border: 4px solid #34495e; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
        #speed-text { position: absolute; bottom: 15px; color: white; font-weight: bold; font-size: 0.9rem; }
        .needle { position: absolute; bottom: 50%; left: 50%; width: 4px; height: 40px; background: #e74c3c; transform-origin: bottom center; transform: translateX(-50%) rotate(-130deg); transition: transform 0.1s linear; border-radius: 2px; }
        .center-dot { position: absolute; width: 12px; height: 12px; background: #ecf0f1; border-radius: 50%; }

        /* Button Steering Overlay */
        #steering-btns { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 6; }
        .steer-btn { width: 70px; height: 70px; background: rgba(0,0,0,0.4); border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.8); font-size: 2rem; pointer-events: auto; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        .steer-btn:active { background: rgba(255,255,255,0.4); border-color: white; color: white; transform: scale(0.95); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <!-- HUD -->
    <div id="hud" class="hidden">
        <div id="btn-pause">⏸</div>
        <div id="score-board">
            <div class="current" id="score">0</div>
            <div class="high">HI: <span id="hi-score">0</span></div>
        </div>
        
        <div id="speedometer">
            <div class="needle" id="speed-needle"></div>
            <div class="center-dot"></div>
            <div id="speed-text">0 km/h</div>
        </div>

        <div id="steering-btns" class="hidden">
            <div id="btn-left" class="steer-btn">◀</div>
            <div id="btn-right" class="steer-btn">▶</div>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="menu-screen" class="overlay">
        <h1>Moto Rush</h1>
        <h2>Endless Highway Vibe</h2>
        <button id="btn-play" class="action-btn">Tap to Play</button>
        
        <div class="settings">
            <div class="toggle-row">
                <span>Controls</span>
                <div id="control-icon-main" class="control-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" transform="rotate(-15 12 12)" stroke="#f1c40f" stroke-width="2" fill="none"/></svg>
                </div>
                <label class="switch">
                    <input type="checkbox" class="controls-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <span>SFX</span>
                <input type="range" min="0" max="100" value="100" class="vol-slider sfx-slider">
            </div>
            <div class="toggle-row">
                <span>Ambient</span>
                <input type="range" min="0" max="100" value="100" class="vol-slider bgm-slider">
            </div>
        </div>
    </div>

    <!-- Pause Menu -->
    <div id="pause-screen" class="overlay hidden">
        <h1>PAUSED</h1>
        <button id="btn-resume" class="action-btn" style="background:#2ecc71;">Resume</button>
        
        <div class="settings">
            <div class="toggle-row">
                <span>Controls</span>
                <div id="control-icon-pause" class="control-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" transform="rotate(-15 12 12)" stroke="#f1c40f" stroke-width="2" fill="none"/></svg>
                </div>
                <label class="switch">
                    <input type="checkbox" class="controls-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <span>SFX</span>
                <input type="range" min="0" max="100" value="100" class="vol-slider sfx-slider">
            </div>
            <div class="toggle-row">
                <span>Ambient</span>
                <input type="range" min="0" max="100" value="100" class="vol-slider bgm-slider">
            </div>
        </div>
        <button id="btn-menu-from-pause" class="action-btn menu-btn">Main Menu</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="overlay hidden">
        <h1>CRASHED!</h1>
        <div class="score-text">Score: <span id="final-score" style="color:#f1c40f; font-weight:bold;">0</span></div>
        <div class="score-text">High Score: <span id="final-hi-score">0</span></div>
        <button id="btn-retry" class="action-btn">Retry</button>
        <button id="btn-menu" class="action-btn menu-btn">Main Menu</button>
    </div>
</div>

<script>
    // --- Fail-Safe Polyfill for Older Mobile Browsers ---
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (typeof r === 'undefined') r = 0;
            this.beginPath();
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };
    }

    // --- Setup & Context ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    // --- Pre-render Realistic Bike Sprite ---
    const bikeSprite = document.createElement('canvas');
    bikeSprite.width = 60; bikeSprite.height = 120;
    const bctx = bikeSprite.getContext('2d');
    
    // Shadow
    bctx.fillStyle = 'rgba(0,0,0,0.5)';
    bctx.beginPath();
    if(bctx.ellipse) { bctx.ellipse(30, 60, 20, 55, 0, 0, Math.PI * 2); } 
    else { bctx.arc(30, 60, 20, 0, Math.PI * 2); } 
    bctx.fill();
    
    // Tires
    bctx.fillStyle = '#111'; bctx.fillRect(25, 2, 10, 25); // Front tire
    bctx.fillStyle = '#111'; bctx.fillRect(23, 95, 14, 23); // Rear tire
    
    // Forks
    bctx.fillStyle = '#bdc3c7'; bctx.fillRect(22, 12, 3, 15); bctx.fillRect(35, 12, 3, 15);
    
    // Front fairing/windshield
    bctx.fillStyle = 'rgba(0, 200, 255, 0.4)'; bctx.beginPath(); bctx.moveTo(30, 10); bctx.lineTo(42, 35); bctx.lineTo(18, 35); bctx.fill();
    bctx.strokeStyle = '#fff'; bctx.lineWidth = 1; bctx.stroke();

    // Headlight
    bctx.fillStyle = '#ffffcc'; bctx.beginPath(); 
    if(bctx.ellipse) { bctx.ellipse(30, 15, 6, 3, 0, 0, Math.PI * 2); }
    else { bctx.arc(30, 15, 6, 0, Math.PI * 2); }
    bctx.fill();
    bctx.shadowColor = '#ffffcc'; bctx.shadowBlur = 10; bctx.fill(); bctx.shadowBlur = 0;
    
    // Main bodywork
    bctx.fillStyle = '#e74c3c'; bctx.beginPath(); bctx.moveTo(30, 8); bctx.lineTo(48, 45); bctx.lineTo(38, 85); bctx.lineTo(22, 85); bctx.lineTo(12, 45); bctx.fill();
    
    // Highlight lines on body
    bctx.strokeStyle = '#ff7675'; bctx.lineWidth = 2; bctx.beginPath(); bctx.moveTo(30, 12); bctx.lineTo(44, 45); bctx.stroke();
    
    // Engine/Mechanics
    bctx.fillStyle = '#2c3e50'; bctx.beginPath(); bctx.moveTo(30, 25); bctx.lineTo(40, 48); bctx.lineTo(20, 48); bctx.fill();
    bctx.fillStyle = '#1a1a1a'; bctx.roundRect(16, 50, 28, 30, 8); bctx.fill();
    
    // Gas tank
    bctx.fillStyle = '#c0392b'; bctx.beginPath(); 
    if(bctx.ellipse) { bctx.ellipse(30, 45, 12, 15, 0, 0, Math.PI * 2); }
    else { bctx.arc(30, 45, 12, 0, Math.PI * 2); }
    bctx.fill();
    
    // Rider Helmet
    bctx.fillStyle = '#c0392b'; bctx.beginPath(); bctx.arc(30, 55, 10, 0, Math.PI * 2); bctx.fill();
    bctx.fillStyle = '#000'; bctx.beginPath(); bctx.arc(30, 53, 7, Math.PI, Math.PI * 2); bctx.fill();
    
    // Rider shoulders/arms
    bctx.strokeStyle = '#1a1a1a'; bctx.lineWidth = 5; bctx.lineCap = 'round'; bctx.beginPath(); bctx.moveTo(20, 55); bctx.lineTo(12, 40); bctx.lineTo(25, 35); bctx.moveTo(40, 55); bctx.lineTo(48, 40); bctx.lineTo(35, 35); bctx.stroke();
    
    // Exhausts
    bctx.fillStyle = '#95a5a6'; bctx.fillRect(40, 80, 5, 25); bctx.fillRect(15, 80, 5, 25); 
    
    // Taillight
    bctx.fillStyle = '#ff0000'; bctx.shadowColor = '#ff0000'; bctx.shadowBlur = 8;
    bctx.fillRect(26, 95, 8, 4);
    bctx.shadowBlur = 0;

    // --- Pre-render Realistic Tree Sprite ---
    const treeSprite = document.createElement('canvas');
    treeSprite.width = 100; treeSprite.height = 100;
    const tctx = treeSprite.getContext('2d');
    
    // Shadow
    tctx.fillStyle = 'rgba(0,0,0,0.3)';
    tctx.beginPath();
    if(tctx.ellipse) { tctx.ellipse(50, 75, 30, 15, 0, 0, Math.PI * 2); }
    else { tctx.arc(50, 75, 30, 0, Math.PI * 2); }
    tctx.fill();
    
    // Tree Trunk
    tctx.fillStyle = '#5c4033';
    tctx.fillRect(45, 60, 10, 30);
    
    // Foliage (jagged edges to simulate realistic leaves)
    tctx.translate(50, 50);
    for (let layer = 0; layer < 5; layer++) {
        let size = 40 - layer * 6;
        tctx.fillStyle = `hsl(120, 50%, ${25 + layer * 8}%)`;
        tctx.beginPath();
        for (let i = 0; i < 16; i++) {
            let angle = (i / 16) * Math.PI * 2;
            let radius = size + (i % 2 === 0 ? 8 : -2) + (Math.random()*4 - 2);
            tctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius - layer*5);
        }
        tctx.closePath();
        tctx.fill();
        tctx.strokeStyle = 'rgba(0,0,0,0.2)';
        tctx.lineWidth = 1;
        tctx.stroke();
    }
    tctx.translate(-50, -50);

    // --- UI Elements ---
    const menuScreen = document.getElementById('menu-screen');
    const pauseScreen = document.getElementById('pause-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const hud = document.getElementById('hud');
    const scoreEl = document.getElementById('score');
    const hiScoreEl = document.getElementById('hi-score');
    const finalScoreEl = document.getElementById('final-score');
    const finalHiScoreEl = document.getElementById('final-hi-score');
    const speedNeedle = document.getElementById('speed-needle');
    const speedText = document.getElementById('speed-text');
    const steeringBtns = document.getElementById('steering-btns');
    
    const sfxSliders = document.querySelectorAll('.sfx-slider');
    const bgmSliders = document.querySelectorAll('.bgm-slider');
    const controlToggles = document.querySelectorAll('.controls-toggle');
    const iconMain = document.getElementById('control-icon-main');
    const iconPause = document.getElementById('control-icon-pause');
    
    const svgTilt = `<svg width="28" height="28" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" transform="rotate(-15 12 12)" stroke="#f1c40f" stroke-width="2" fill="none"/></svg>`;
    const svgArrows = `&lt; &gt;`;

    // --- Game State & Variables ---
    let state = 'MENU'; 
    let controlMode = 'TILT'; 
    let lastTime = 0;
    let shakeTime = 0;
    
    // Storage Fail-Safe
    let score = 0;
    let highScore = 0;
    try {
        highScore = localStorage.getItem('bikeHighScore') || 0;
    } catch(e) { console.warn("LocalStorage blocked."); }
    hiScoreEl.innerText = Math.floor(highScore);
    
    let minSpeed = 5; let maxSpeed = 25; 
    let speed = minSpeed; let isAccelerating = false;
    let accelRate = 6.0; let decelRate = 6.0; 
    
    let roadLeft, roadWidth, laneWidth;
    const ROAD_WIDTH_RATIO = 0.6; 
    
    let bike = { lane: 2, x: 0, y: 0, w: 40, h: 80, targetX: 0, lean: 0, vx: 0 };
    let obstacles = [];
    let laneOffset = 0;
    let absoluteScroll = 0;
    
    let sfxVol = 1.0; let bgmVol = 1.0;

    // --- Dynamic Audio System (Wind, Whooshes, and Gears) ---
    const AudioSys = {
        ctx: null, engineAudio: null,
        bgmGain: null, padOsc1: null, padOsc2: null, 
        currentGear: 1, gearShiftTime: 0,
        notes: [ 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00 ],
        step: 0, nextNoteTime: 0,
        init() {
            try {
                if (!this.engineAudio) {
                    this.engineAudio = new Audio('https://drive.google.com/uc?export=download&id=1clM5XbV8kwkfLZl1GGbVYUD9T31Qskd3');
                    this.engineAudio.loop = true;
                    this.engineAudio.preservesPitch = false;
                    try { this.engineAudio.mozPreservesPitch = false; } catch(e){}
                    try { this.engineAudio.webkitPreservesPitch = false; } catch(e){}
                }
                if (this.engineAudio.paused) {
                    this.engineAudio.play().catch(e => console.warn(e));
                }

                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    
                    this.bgmGain = this.ctx.createGain();
                    this.bgmGain.gain.value = 0;
                    
                    const bgmFilter = this.ctx.createBiquadFilter();
                    bgmFilter.type = 'lowpass';
                    bgmFilter.frequency.value = 800;
                    bgmFilter.connect(this.bgmGain);
                    this.bgmGain.connect(this.ctx.destination);
                    this.bgmFilter = bgmFilter;
                    
                    this.padOsc1 = this.ctx.createOscillator();
                    this.padOsc1.type = 'sine';
                    this.padOsc1.frequency.value = 130.81;
                    
                    this.padOsc2 = this.ctx.createOscillator();
                    this.padOsc2.type = 'triangle';
                    this.padOsc2.frequency.value = 196.00;
                    
                    const padGain = this.ctx.createGain();
                    padGain.gain.value = 0.15;
                    this.padOsc1.connect(padGain);
                    this.padOsc2.connect(padGain);
                    padGain.connect(this.bgmFilter);
                    this.padOsc1.start();
                    this.padOsc2.start();
                    
                    this.nextNoteTime = this.ctx.currentTime + 0.1;
                }
            } catch(e) { console.warn("Audio init failed", e); }
        },
        playArpNote() {
            if (!this.ctx || state !== 'PLAYING') return;
            while (this.nextNoteTime < this.ctx.currentTime + 0.1) {
                let note = this.notes[Math.floor(Math.random() * this.notes.length)];
                if (this.step % 4 === 0) note /= 2;
                
                let osc = this.ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(note, this.nextNoteTime);
                
                let gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0, this.nextNoteTime);
                gain.gain.linearRampToValueAtTime(0.3 * bgmVol, this.nextNoteTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, this.nextNoteTime + 0.3);
                
                osc.connect(gain);
                gain.connect(this.bgmFilter);
                osc.start(this.nextNoteTime);
                osc.stop(this.nextNoteTime + 0.35);
                
                this.step++;
                this.nextNoteTime += 0.25; 
            }
        },
        updateVolumes() {
            if (!this.ctx) return;
            try {
                if (state === 'PLAYING') {
                    this.bgmGain.gain.setTargetAtTime(bgmVol, this.ctx.currentTime, 0.5);
                } else if (state === 'PAUSED') {
                    this.bgmGain.gain.setTargetAtTime(bgmVol * 0.2, this.ctx.currentTime, 0.5); 
                } else {
                    this.bgmGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.5);
                }
                this.updateEngine(speed);
            } catch(e) {}
        },
        updateEngine(currentSpeed) {
            if (!this.engineAudio) return;
            try {
                if (state !== 'PLAYING' || sfxVol === 0) {
                    this.engineAudio.volume = 0;
                    return;
                }
                
                let speedRange = maxSpeed - minSpeed;
                let currentS = Math.max(0, currentSpeed - minSpeed);
                
                let gearSize = speedRange / 5;
                let gear = Math.floor(currentS / gearSize) + 1;
                if (gear > 5) gear = 5;
                
                let rpm = (currentS % gearSize) / gearSize;
                if (currentSpeed >= maxSpeed - 0.1) rpm = 0.95 + Math.random()*0.05;

                let t = performance.now() / 1000;
                
                if (this.engineAudio.paused) {
                    const p = this.engineAudio.play();
                    if (p !== undefined) p.catch(e => {});
                }

                if (gear !== this.currentGear && t - this.gearShiftTime > 0.4) {
                    this.currentGear = gear;
                    this.gearShiftTime = t;
                    
                    this.engineAudio.playbackRate = Math.max(0.5, 0.8 + (gear * 0.1));
                    this.engineAudio.volume = Math.max(0, Math.min(1, sfxVol * 0.4));
                } else if (t - this.gearShiftTime > 0.1) {
                    let rate = 0.8 + (gear * 0.15) + (rpm * 1.5);
                    if (currentSpeed > maxSpeed * 0.8) {
                        rate += Math.sin(t * 150) * 0.05;
                    }
                    this.engineAudio.playbackRate = Math.min(4.0, Math.max(0.5, rate));
                    this.engineAudio.volume = Math.max(0, Math.min(1, sfxVol * (0.4 + rpm * 0.6)));
                }
                
                this.playArpNote();
            } catch(e){}
        },
        playWhoosh() { 
            // Removed whoosh logic
        },
        playBlink() {
            if (!this.ctx || sfxVol === 0 || state !== 'PLAYING') return;
            try {
                const t = this.ctx.currentTime;
                // Beep 1
                const osc1 = this.ctx.createOscillator(); 
                const gain1 = this.ctx.createGain();
                osc1.type = 'sine'; 
                osc1.frequency.setValueAtTime(2800, t);
                gain1.gain.setValueAtTime(sfxVol * 0.015, t); 
                gain1.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                osc1.connect(gain1); gain1.connect(this.ctx.destination);
                osc1.start(t); osc1.stop(t + 0.1);
                
                // Beep 2
                const osc2 = this.ctx.createOscillator(); 
                const gain2 = this.ctx.createGain();
                osc2.type = 'sine'; 
                osc2.frequency.setValueAtTime(2800, t + 0.15);
                gain2.gain.setValueAtTime(sfxVol * 0.015, t + 0.15); 
                gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
                osc2.connect(gain2); gain2.connect(this.ctx.destination);
                osc2.start(t + 0.15); osc2.stop(t + 0.25);
            } catch(e){}
        },
        playCrash() {
            if (!this.ctx || sfxVol === 0) return;
            try {
                const bufferSize = this.ctx.sampleRate * 0.5;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                const noise = this.ctx.createBufferSource(); noise.buffer = buffer;
                const filter = this.ctx.createBiquadFilter(); filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000, this.ctx.currentTime); filter.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 0.5);
                const gain = this.ctx.createGain(); gain.gain.setValueAtTime(sfxVol * 0.5, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
                noise.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination); noise.start();
            }catch(e){}
        }
    };

    // --- Initialization & Resizing ---
    function resize() {
        width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight;
        roadWidth = width * ROAD_WIDTH_RATIO; roadLeft = (width - roadWidth) / 2; laneWidth = roadWidth / 5;
        bike.w = laneWidth * 0.55; bike.h = bike.w * 2; bike.y = height * 0.70; 
    }
    window.addEventListener('resize', resize); resize();

    // --- Inputs & UI Listeners ---
    function syncControls(mode) {
        controlMode = mode;
        controlToggles.forEach(t => t.checked = (mode === 'TILT'));
        iconMain.innerHTML = mode === 'TILT' ? svgTilt : svgArrows;
        iconPause.innerHTML = mode === 'TILT' ? svgTilt : svgArrows;
        if(state === 'PLAYING' || state === 'PAUSED') {
            if(mode === 'BUTTONS') steeringBtns.classList.remove('hidden'); else steeringBtns.classList.add('hidden');
        }
    }
    controlToggles.forEach(t => t.addEventListener('change', e => syncControls(e.target.checked ? 'TILT' : 'BUTTONS')));
    function syncSFX(val) { sfxVol = val / 100; sfxSliders.forEach(s => s.value = val); AudioSys.updateVolumes(); }
    function syncBGM(val) { bgmVol = val / 100; bgmSliders.forEach(s => s.value = val); AudioSys.updateVolumes(); }
    sfxSliders.forEach(s => s.addEventListener('input', e => syncSFX(e.target.value)));
    bgmSliders.forEach(s => s.addEventListener('input', e => syncBGM(e.target.value)));

    function requestPermissionsAndStart() {
        // Fallback robust permission request
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(permissionState => {
                if (permissionState === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                startGame();
            }).catch(err => {
                console.warn(err);
                startGame(); // Force start even if denied/failed
            });
        } else { 
            window.addEventListener('deviceorientation', handleOrientation); 
            startGame(); 
        }
    }

    function handleOrientation(e) {
        if (state !== 'PLAYING' || controlMode !== 'TILT') return;
        let tilt = e.gamma || 0;
        if (tilt < -30) tilt = -30; if (tilt > 30) tilt = 30;
        if (tilt < -15) bike.lane = 0; else if (tilt < -5) bike.lane = 1; else if (tilt < 5) bike.lane = 2; else if (tilt < 15) bike.lane = 3; else bike.lane = 4;
    }

    const btnLeft = document.getElementById('btn-left'); const btnRight = document.getElementById('btn-right');
    function moveLeft(e) { e.preventDefault(); e.stopPropagation(); if (state === 'PLAYING') bike.lane = Math.max(0, bike.lane - 1); }
    function moveRight(e) { e.preventDefault(); e.stopPropagation(); if (state === 'PLAYING') bike.lane = Math.min(4, bike.lane + 1); }
    btnLeft.addEventListener('touchstart', moveLeft, {passive: false}); btnLeft.addEventListener('mousedown', moveLeft);
    btnRight.addEventListener('touchstart', moveRight, {passive: false}); btnRight.addEventListener('mousedown', moveRight);

    const handleStart = (e) => { if(e.target === canvas) { isAccelerating = true; e.preventDefault(); }};
    const handleEnd = (e) => { if(e.target === canvas) { isAccelerating = false; e.preventDefault(); }};
    window.addEventListener('touchstart', handleStart, {passive: false}); window.addEventListener('touchend', handleEnd, {passive: false});
    window.addEventListener('mousedown', handleStart); window.addEventListener('mouseup', handleEnd);

    document.getElementById('btn-pause').addEventListener('click', () => {
        if (state === 'PLAYING') { state = 'PAUSED'; pauseScreen.classList.remove('hidden'); hud.classList.add('hidden'); AudioSys.updateVolumes(); }
    });
    document.getElementById('btn-resume').addEventListener('click', () => {
        state = 'PLAYING'; lastTime = performance.now(); pauseScreen.classList.add('hidden'); hud.classList.remove('hidden'); AudioSys.updateVolumes(); requestAnimationFrame(gameLoop);
    });

    // --- Core Game Functions ---
    function startGame() {
        AudioSys.init(); 
        if (AudioSys.ctx && AudioSys.ctx.state === 'suspended') AudioSys.ctx.resume();
        state = 'PLAYING'; score = 0; speed = 5; minSpeed = 5; maxSpeed = 25; isAccelerating = false;
        bike.lane = 2; bike.lean = 0; bike.vx = 0; bike.x = roadLeft + bike.lane * laneWidth + (laneWidth - bike.w) / 2;
        obstacles = []; absoluteScroll = 0; lastTime = performance.now();
        menuScreen.classList.add('hidden'); pauseScreen.classList.add('hidden'); gameOverScreen.classList.add('hidden');
        hud.classList.remove('hidden'); syncControls(controlMode); AudioSys.updateVolumes();
        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        state = 'GAMEOVER'; shakeTime = 30;
        AudioSys.playCrash(); AudioSys.updateVolumes();
        try { if (score > highScore) { highScore = score; localStorage.setItem('bikeHighScore', highScore); } } catch(e){}
        hud.classList.add('hidden'); steeringBtns.classList.add('hidden'); gameOverScreen.classList.remove('hidden');
        finalScoreEl.innerText = Math.floor(score); finalHiScoreEl.innerText = Math.floor(highScore); hiScoreEl.innerText = Math.floor(highScore);
    }

    function goToMenu() {
        state = 'MENU'; pauseScreen.classList.add('hidden'); gameOverScreen.classList.add('hidden'); menuScreen.classList.remove('hidden');
        ctx.fillStyle = '#2c3e50'; ctx.fillRect(0,0,width,height); AudioSys.updateVolumes();
    }

    // --- Entity Spawning & Smart Traffic Logic ---
    function isLaneSafe(lane, yToCheck, safeDist, ignoreCar = null) {
        for (let c of obstacles) {
            if (c === ignoreCar) continue;
            if (c.lane === lane || c.targetLane === lane) {
                if (Math.abs(c.y - yToCheck) < safeDist) return false;
            }
        }
        return true;
    }

    function spawnObstacle() {
        let blockedLanes = [];
        let dangerZone = laneWidth * 0.7 * 1.8 * 3.5;
        for (let i = 0; i < 5; i++) { if (!isLaneSafe(i, -laneWidth * 0.7 * 1.8, dangerZone/2.5)) blockedLanes.push(i); }
        
        let safeLanesExt = [0,1,2,3,4].filter(l => isLaneSafe(l, dangerZone/2, dangerZone/2));
        if (safeLanesExt.length === 1 && !blockedLanes.includes(safeLanesExt[0])) blockedLanes.push(safeLanesExt[0]);

        let availableLanes = [0, 1, 2, 3, 4].filter(l => !blockedLanes.includes(l));
        if (availableLanes.length === 0) return;

        const lane = availableLanes[Math.floor(Math.random() * availableLanes.length)];
        const colors = ['#f39c12', '#9b59b6', '#3498db', '#ecf0f1', '#e67e22', '#1abc9c'];
        
        let type = 'CAR';
        let w = laneWidth * 0.7;
        let h = w * 1.8;
        let speedMod = Math.random() * 0.3 + 0.5;
        let isSwitcher = Math.random() < 0.25;
        let color = '#3498db';

        let r = Math.random();
        if (r < 0.04) {
            type = 'TRUCK';
            w = laneWidth * 0.85;
            h = w * 3.5;
            speedMod = Math.random() * 0.1 + 0.3;
            isSwitcher = false;
        } else if (r < 0.07) {
            type = 'BIKE';
            w = laneWidth * 0.4;
            h = w * 2.0;
            speedMod = Math.random() * 0.4 + 0.7;
            isSwitcher = Math.random() < 0.4;
        } else if (r < 0.1) {
            type = 'CYCLE';
            w = laneWidth * 0.3;
            h = w * 2.5;
            speedMod = Math.random() * 0.1 + 0.2;
            isSwitcher = false;
        }

        if (type === 'CAR' || type === 'TRUCK') {
            color = colors[Math.floor(Math.random() * colors.length)];
        } else if (type === 'BIKE') {
            color = ['#e74c3c', '#2ecc71', '#f1c40f'][Math.floor(Math.random() * 3)];
        } else {
            color = '#bdc3c7';
        }

        obstacles.push({
            type: type, lane: lane, x: roadLeft + lane * laneWidth + (laneWidth - w) / 2, y: -h, w: w, h: h,
            color: color,
            speedModifier: speedMod,
            isSwitcher: isSwitcher, 
            switchState: 'IDLE', targetLane: lane, hasPassed: false
        });
    }

    // --- Update Logic ---
    let obstacleTimer = 0;

    function update(dt) {
        if (state !== 'PLAYING') return;

        minSpeed += dt * 0.45;
        maxSpeed += dt * 0.45;

        if (isAccelerating) { speed += accelRate * dt; if (speed > maxSpeed) speed = maxSpeed; } 
        else { speed -= decelRate * dt; if (speed < minSpeed) speed = minSpeed; }

        score += speed * dt * 2; scoreEl.innerText = Math.floor(score);
        const speedKmh = Math.floor(speed * 9); speedText.innerText = `${speedKmh} km/h`;
        const angle = -130 + (speedKmh / 230) * 260; speedNeedle.style.transform = `translateX(-50%) rotate(${angle}deg)`;
        
        AudioSys.updateVolumes(); 

        bike.targetX = roadLeft + bike.lane * laneWidth + (laneWidth - bike.w) / 2;
        let steerDiff = bike.targetX - bike.x;
        let spring = 50;
        let damper = 8;
        let ax = steerDiff * spring - (bike.vx || 0) * damper;
        bike.vx = (bike.vx || 0) + ax * dt;
        bike.x += bike.vx * dt;
        bike.lean = Math.max(-35, Math.min(35, bike.vx * 0.06)); 

        absoluteScroll += speed * dt * 50;
        laneOffset += speed * 0.5; if (laneOffset > 40) laneOffset = 0;

        obstacleTimer += speed * dt; if (obstacleTimer > 3.5) { spawnObstacle(); obstacleTimer = 0; }

        // --- Anti-Phasing Traffic Manager ---
        for (let i = 0; i < obstacles.length; i++) {
            let obs = obstacles[i];
            let carAhead = null;
            let minDistance = Infinity;

            for (let j = 0; j < obstacles.length; j++) {
                if (i === j) continue;
                let other = obstacles[j];
                let sameLane = (other.lane === obs.lane) || (other.targetLane === obs.lane) || (obs.targetLane === other.lane);
                if (sameLane) {
                    if (other.y > obs.y) { 
                        let dist = other.y - (obs.y + obs.h);
                        if (dist > 0 && dist < minDistance) { minDistance = dist; carAhead = other; }
                    }
                }
            }
            if (carAhead && minDistance < obs.h * 2.0) {
                obs.speedModifier = Math.min(obs.speedModifier, carAhead.speedModifier);
                if (minDistance < obs.h * 0.5) { obs.y = carAhead.y - obs.h * 1.5; }
            }
        }

        // --- Car Movement & Switching Logic ---
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.y += speed * obs.speedModifier * dt * 50;
            
            if (obs.y > bike.y + bike.h && !obs.hasPassed) {
                obs.hasPassed = true; 
            }

            if (obs.isSwitcher) {
                if (obs.switchState === 'IDLE' && obs.y > 0 && obs.y < height * 0.3) {
                    let dir = Math.random() < 0.5 ? -1 : 1;
                    let targetL = obs.lane + dir;
                    if (targetL >= 0 && targetL <= 4 && isLaneSafe(targetL, obs.y, obs.h * 2.5, obs)) {
                        obs.switchState = 'BLINKING'; obs.targetLane = targetL;
                        obs.switchTimer = 1.0; obs.blinkPulse = 0; obs.blinkOn = false;
                    } else { obs.isSwitcher = false; }
                } 
                else if (obs.switchState === 'BLINKING') {
                    obs.switchTimer -= dt; obs.blinkPulse += dt;
                    if (obs.blinkPulse > 0.3) {
                        obs.blinkOn = !obs.blinkOn; obs.blinkPulse = 0;
                        if (obs.blinkOn) AudioSys.playBlink();
                    }
                    if (obs.switchTimer <= 0) {
                        if (isLaneSafe(obs.targetLane, obs.y, obs.h * 1.5, obs)) {
                            obs.switchState = 'SWITCHING';
                        } else {
                            obs.switchState = 'DONE'; obs.targetLane = obs.lane;
                        }
                    }
                } 
                else if (obs.switchState === 'SWITCHING') {
                    let targetX = roadLeft + obs.targetLane * laneWidth + (laneWidth - obs.w) / 2;
                    let dir = Math.sign(targetX - obs.x);
                    let switchSpeed = laneWidth * 2.5 * dt; 
                    obs.x += dir * switchSpeed;

                    if ((dir > 0 && obs.x >= targetX) || (dir < 0 && obs.x <= targetX)) {
                        obs.x = targetX; obs.lane = obs.targetLane; obs.switchState = 'DONE';
                    }
                }
            }

            let hitMargin = 5;
            if (bike.x + hitMargin < obs.x + obs.w - hitMargin && bike.x + bike.w - hitMargin > obs.x + hitMargin &&
                bike.y + hitMargin < obs.y + obs.h - hitMargin && bike.y + bike.h - hitMargin > obs.y + hitMargin) {
                gameOver();
            }
            if (obs.y > height) obstacles.splice(i, 1);
        }
    }

    // --- Drawing Logic ---
    function draw() {
        ctx.fillStyle = '#55a630'; ctx.fillRect(0, 0, width, height);

        ctx.save();
        if (shakeTime > 0) { ctx.translate((Math.random()-0.5)*20, (Math.random()-0.5)*20); shakeTime--; }

        ctx.fillStyle = '#7f8c8d'; ctx.fillRect(roadLeft, 0, roadWidth, height);
        ctx.fillStyle = '#ecf0f1'; ctx.fillRect(roadLeft - 5, 0, 5, height); ctx.fillRect(roadLeft + roadWidth, 0, 5, height);

        ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 4; ctx.setLineDash([20, 20]); ctx.lineDashOffset = -laneOffset;
        for (let i = 1; i < 5; i++) {
            ctx.beginPath(); ctx.moveTo(roadLeft + i * laneWidth, 0); ctx.lineTo(roadLeft + i * laneWidth, height); ctx.stroke();
        }
        ctx.setLineDash([]);

        let treeSpacing = height / 5;
        let offset = absoluteScroll % treeSpacing;
        for (let i = -1; i < 6; i++) {
            let y = i * treeSpacing + offset;
            ctx.drawImage(treeSprite, roadLeft - 80, y - 20, 80, 80);
            ctx.drawImage(treeSprite, roadLeft + roadWidth + 0, y - 20, 80, 80);
        }

        obstacles.forEach(obs => {
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(obs.x + 5, obs.y + 5, obs.w, obs.h);
            
            if (obs.type === 'CAR' || !obs.type) {
                ctx.fillStyle = obs.color; ctx.beginPath(); ctx.roundRect(obs.x, obs.y, obs.w, obs.h, 5); ctx.fill();
                ctx.fillStyle = '#2c3e50'; ctx.fillRect(obs.x + 4, obs.y + obs.h*0.2, obs.w - 8, obs.h*0.2); ctx.fillRect(obs.x + 4, obs.y + obs.h*0.7, obs.w - 8, obs.h*0.15); 
                ctx.fillStyle = '#ff0000'; ctx.fillRect(obs.x + 4, obs.y + obs.h - 4, 8, 4); ctx.fillRect(obs.x + obs.w - 12, obs.y + obs.h - 4, 8, 4);
            } else if (obs.type === 'TRUCK') {
                ctx.fillStyle = obs.color; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.fillStyle = '#ecf0f1'; ctx.fillRect(obs.x + 2, obs.y + 2, obs.w - 4, obs.h * 0.85); 
                ctx.fillStyle = '#34495e'; ctx.fillRect(obs.x + 4, obs.y + obs.h * 0.9, obs.w - 8, obs.h * 0.08); 
            } else if (obs.type === 'BIKE' || obs.type === 'CYCLE') {
                ctx.fillStyle = '#111'; ctx.fillRect(obs.x + obs.w/2 - 2, obs.y, 4, obs.h*0.2); 
                ctx.fillRect(obs.x + obs.w/2 - 3, obs.y + obs.h*0.8, 6, obs.h*0.2); 
                ctx.fillStyle = obs.color; ctx.beginPath(); 
                if(ctx.ellipse) { ctx.ellipse(obs.x + obs.w/2, obs.y + obs.h/2, obs.w/2, obs.h*0.4, 0, 0, Math.PI*2); }
                else { ctx.arc(obs.x+obs.w/2, obs.y+obs.h/2, obs.w/2, 0, Math.PI*2); }
                ctx.fill(); 
                if(obs.type === 'BIKE') {
                    ctx.fillStyle = '#1a1a1a'; ctx.beginPath(); ctx.arc(obs.x + obs.w/2, obs.y + obs.h*0.45, obs.w*0.3, 0, Math.PI*2); ctx.fill(); 
                    ctx.fillStyle = '#ff0000'; ctx.fillRect(obs.x + obs.w/2 - 2, obs.y + obs.h - 3, 4, 3); 
                }
            }
            
            if (obs.switchState === 'BLINKING' && obs.blinkOn) {
                ctx.fillStyle = '#f39c12';
                const isLeft = obs.targetLane < obs.lane;
                const bx = isLeft ? obs.x - 2 : obs.x + obs.w - 6;
                ctx.fillRect(bx, obs.y + 5, 8, 8); 
                ctx.fillRect(bx, obs.y + obs.h - 13, 8, 8); 
            }
        });

        if (state !== 'GAMEOVER' || shakeTime % 4 < 2) { 
            ctx.save(); ctx.translate(bike.x + bike.w/2, bike.y + bike.h/2); ctx.rotate(bike.lean * Math.PI / 180);
            let bx = -bike.w/2; let by = -bike.h/2;
            ctx.drawImage(bikeSprite, bx, by, bike.w, bike.h);
            
            if (isAccelerating) {
                const flameL = 10 + Math.random() * 15; ctx.fillStyle = '#f39c12';
                ctx.beginPath(); ctx.moveTo(bx + bike.w*0.75, by + bike.h); ctx.lineTo(bx + bike.w*0.80, by + bike.h + flameL); ctx.lineTo(bx + bike.w*0.85, by + bike.h); ctx.fill();
                ctx.beginPath(); ctx.moveTo(bx + bike.w*0.15, by + bike.h); ctx.lineTo(bx + bike.w*0.20, by + bike.h + flameL); ctx.lineTo(bx + bike.w*0.25, by + bike.h); ctx.fill();
            }
            ctx.restore();
        }
        ctx.restore();
    }

    // --- Main Loop ---
    function gameLoop(timestamp) {
        if (state === 'PLAYING') {
            let dt = (timestamp - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1; 
            update(dt);
        }
        if (state === 'PLAYING' || state === 'PAUSED' || shakeTime > 0) {
            draw(); requestAnimationFrame(gameLoop);
        }
        lastTime = timestamp;
    }

    // --- Button Listeners ---
    document.getElementById('btn-play').addEventListener('click', requestPermissionsAndStart);
    document.getElementById('btn-retry').addEventListener('click', requestPermissionsAndStart);
    document.getElementById('btn-menu').addEventListener('click', goToMenu);
    document.getElementById('btn-menu-from-pause').addEventListener('click', goToMenu);

    // Initial render
    ctx.fillStyle = '#2c3e50'; ctx.fillRect(0,0,width,height);

</script>
</body>
