<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Bike Racing</title>
    <style>
        /* CSS & Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #2c3e50; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; background: #55a630; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        /* UI Overlays */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.85); transition: opacity 0.5s ease; z-index: 10; }
        .hidden { opacity: 0; pointer-events: none !important; display: none !important; }
        
        h1 { color: #f1c40f; font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; text-align: center;}
        h2 { color: #ecf0f1; font-size: 1.5rem; margin-bottom: 30px; }
        .score-text { color: #fff; font-size: 1.2rem; margin: 5px 0; }
        
        button.action-btn { background: #e74c3c; color: white; border: none; padding: 15px 40px; font-size: 1.5rem; font-weight: bold; border-radius: 30px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s; margin-top: 20px;}
        button.action-btn:active { transform: scale(0.95); }

        .settings { margin-top: 30px; background: rgba(255,255,255,0.1); padding: 15px 30px; border-radius: 15px; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; width: 260px; margin: 15px 0; color: #fff; font-size: 1.2rem;}
        
        /* Switch Toggle */
        .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(22px); }

        .control-label-text { font-size: 0.9rem; font-weight: bold; color: #f1c40f; text-transform: uppercase; width: 80px; text-align: right; }

        /* HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        #score-board { position: absolute; top: 20px; right: 20px; text-align: right; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        #score-board .current { font-size: 2rem; font-weight: bold; color: #f1c40f; }
        #score-board .high { font-size: 1rem; color: #bdc3c7; }

        /* Speedometer - Moved to Top Middle */
        #speedometer { position: absolute; top: 20px; left: calc(50% - 50px); width: 100px; height: 100px; background: rgba(0,0,0,0.6); border: 4px solid #34495e; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
        #speed-text { position: absolute; bottom: 15px; color: white; font-weight: bold; font-size: 0.9rem; }
        .needle { position: absolute; bottom: 50%; left: 50%; width: 4px; height: 40px; background: #e74c3c; transform-origin: bottom center; transform: translateX(-50%) rotate(-130deg); transition: transform 0.1s linear; border-radius: 2px; }
        .center-dot { position: absolute; width: 12px; height: 12px; background: #ecf0f1; border-radius: 50%; }

        /* Mobile Controls Hint */
        #controls-hint { position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.8); text-align: left; font-size: 0.9rem; text-shadow: 1px 1px 3px #000; }

        /* Button Steering Overlay */
        #steering-btns { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 6; }
        .steer-btn { width: 70px; height: 70px; background: rgba(0,0,0,0.4); border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: rgba(255,255,255,0.8); font-size: 2rem; pointer-events: auto; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        .steer-btn:active { background: rgba(255,255,255,0.4); border-color: white; color: white; transform: scale(0.95); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <!-- Heads Up Display -->
    <div id="hud" class="hidden">
        <div id="controls-hint">Hold to Accelerate<br>Tilt to Steer</div>
        
        <div id="score-board">
            <div class="current" id="score">0</div>
            <div class="high">HI: <span id="hi-score">0</span></div>
        </div>
        
        <div id="speedometer">
            <div class="needle" id="speed-needle"></div>
            <div class="center-dot"></div>
            <div id="speed-text">0 km/h</div>
        </div>

        <!-- Button Controls (Hidden if Tilt is selected) -->
        <div id="steering-btns" class="hidden">
            <div id="btn-left" class="steer-btn">◀</div>
            <div id="btn-right" class="steer-btn">▶</div>
        </div>
    </div>

    <!-- Main Menu -->
    <div id="menu-screen" class="overlay">
        <h1>Moto Rush</h1>
        <h2>Infinite 5-Lane Racing</h2>
        <button id="btn-play" class="action-btn">Tap to Play</button>
        
        <div class="settings">
            <div class="toggle-row">
                <span>Controls</span>
                <span id="control-label" class="control-label-text">TILT</span>
                <label class="switch">
                    <input type="checkbox" id="controls-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <span>SFX</span>
                <label class="switch">
                    <input type="checkbox" id="sfx-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <span>Music</span>
                <label class="switch">
                    <input type="checkbox" id="bgm-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="overlay hidden">
        <h1>CRASHED!</h1>
        <div class="score-text">Score: <span id="final-score" style="color:#f1c40f; font-weight:bold;">0</span></div>
        <div class="score-text">High Score: <span id="final-hi-score">0</span></div>
        <button id="btn-retry" class="action-btn">Retry</button>
        <button id="btn-menu" class="action-btn" style="background:#34495e;">Main Menu</button>
    </div>
</div>

<script>
    // --- Setup & Context ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    // --- Pre-render Realistic Bike Sprite ---
    // Creates a highly detailed off-screen canvas to act as the 2D image sprite
    const bikeSprite = document.createElement('canvas');
    bikeSprite.width = 60;
    bikeSprite.height = 120;
    const bctx = bikeSprite.getContext('2d');

    // Shadow
    bctx.fillStyle = 'rgba(0,0,0,0.5)';
    bctx.beginPath();
    bctx.ellipse(30, 60, 20, 55, 0, 0, Math.PI * 2);
    bctx.fill();

    // Front Tire
    bctx.fillStyle = '#111';
    bctx.fillRect(25, 2, 10, 25);
    
    // Front Axle & Forks
    bctx.fillStyle = '#bdc3c7';
    bctx.fillRect(22, 12, 3, 15);
    bctx.fillRect(35, 12, 3, 15);

    // Windshield (Tinted Cyan)
    bctx.fillStyle = 'rgba(0, 200, 255, 0.6)';
    bctx.beginPath();
    bctx.moveTo(30, 15);
    bctx.lineTo(40, 35);
    bctx.lineTo(20, 35);
    bctx.fill();

    // Body Fairings (Sport Red)
    bctx.fillStyle = '#e74c3c';
    bctx.beginPath();
    bctx.moveTo(30, 8); // Nose
    bctx.lineTo(45, 45); // Right wide
    bctx.lineTo(35, 80); // Right tail
    bctx.lineTo(25, 80); // Left tail
    bctx.lineTo(15, 45); // Left wide
    bctx.fill();

    // Carbon Fiber Accents (Dark Gray)
    bctx.fillStyle = '#2c3e50';
    bctx.beginPath();
    bctx.moveTo(30, 25);
    bctx.lineTo(38, 48);
    bctx.lineTo(22, 48);
    bctx.fill();

    // Rider (Leather Suit & Racing Helmet)
    // Shoulders
    bctx.fillStyle = '#1a1a1a';
    bctx.beginPath();
    bctx.roundRect(18, 50, 24, 30, 8);
    bctx.fill();
    // Helmet Base
    bctx.fillStyle = '#c0392b';
    bctx.beginPath();
    bctx.arc(30, 55, 10, 0, Math.PI * 2);
    bctx.fill();
    // Helmet Visor
    bctx.fillStyle = '#000';
    bctx.beginPath();
    bctx.arc(30, 53, 7, Math.PI, Math.PI * 2);
    bctx.fill();
    // Arms holding handlebars
    bctx.strokeStyle = '#1a1a1a';
    bctx.lineWidth = 4;
    bctx.beginPath();
    bctx.moveTo(20, 55); bctx.lineTo(15, 40); bctx.lineTo(25, 35); // Left arm
    bctx.moveTo(40, 55); bctx.lineTo(45, 40); bctx.lineTo(35, 35); // Right arm
    bctx.stroke();

    // Dual Exhaust Pipes
    bctx.fillStyle = '#95a5a6';
    bctx.fillRect(40, 80, 4, 25); // Right pipe
    bctx.fillRect(16, 80, 4, 25); // Left pipe

    // Rear Tire
    bctx.fillStyle = '#111';
    bctx.fillRect(23, 95, 14, 23);

    // Tail Light
    bctx.fillStyle = '#ff0000';
    bctx.fillRect(26, 95, 8, 4);

    // --- UI Elements ---
    const menuScreen = document.getElementById('menu-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const hud = document.getElementById('hud');
    const scoreEl = document.getElementById('score');
    const hiScoreEl = document.getElementById('hi-score');
    const finalScoreEl = document.getElementById('final-score');
    const finalHiScoreEl = document.getElementById('final-hi-score');
    const speedNeedle = document.getElementById('speed-needle');
    const speedText = document.getElementById('speed-text');
    const controlsHint = document.getElementById('controls-hint');
    const steeringBtns = document.getElementById('steering-btns');
    
    // --- Game State & Variables ---
    let state = 'MENU'; // MENU, PLAYING, GAMEOVER
    let controlMode = 'TILT'; // TILT or BUTTONS
    let lastTime = 0;
    let shakeTime = 0;
    
    let score = 0;
    let highScore = localStorage.getItem('bikeHighScore') || 0;
    hiScoreEl.innerText = Math.floor(highScore);
    
    let baseSpeed = 0;
    let minBaseSpeed = 5;
    let maxBaseSpeed = 22;
    let speed = 0;
    let isAccelerating = false;
    
    const ROAD_WIDTH_RATIO = 0.6; 
    let roadLeft, roadWidth, laneWidth;
    
    let bike = { lane: 2, x: 0, y: 0, w: 40, h: 80, targetX: 0, lean: 0 };
    let obstacles = [];
    let scenery = [];
    let laneOffset = 0;
    
    let sfxEnabled = true;
    let bgmEnabled = true;

    // --- Audio System ---
    const AudioSys = {
        ctx: null, engineOsc: null, engineGain: null, bgmOsc1: null, bgmOsc2: null, bgmGain: null,
        init() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                this.engineOsc = this.ctx.createOscillator();
                this.engineOsc.type = 'sawtooth';
                this.engineGain = this.ctx.createGain();
                this.engineGain.gain.value = 0;
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 400;

                this.engineOsc.connect(filter);
                filter.connect(this.engineGain);
                this.engineGain.connect(this.ctx.destination);
                this.engineOsc.start();
                
                this.bgmOsc1 = this.ctx.createOscillator();
                this.bgmOsc2 = this.ctx.createOscillator();
                this.bgmGain = this.ctx.createGain();
                this.bgmOsc1.type = 'triangle';
                this.bgmOsc2.type = 'sine';
                this.bgmOsc1.frequency.value = 110; 
                this.bgmOsc2.frequency.value = 164.81; 
                
                this.bgmOsc1.connect(this.bgmGain);
                this.bgmOsc2.connect(this.bgmGain);
                this.bgmGain.connect(this.ctx.destination);
                this.bgmGain.gain.value = 0;
                this.bgmOsc1.start();
                this.bgmOsc2.start();
            }
        },
        updateEngine(currentSpeed) {
            if (!sfxEnabled || state !== 'PLAYING') {
                if (this.engineGain) this.engineGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.1);
                return;
            }
            const speedRatio = currentSpeed / (maxBaseSpeed + 10);
            this.engineOsc.frequency.setTargetAtTime(50 + speedRatio * 150, this.ctx.currentTime, 0.1);
            this.engineGain.gain.setTargetAtTime(0.05 + speedRatio * 0.1, this.ctx.currentTime, 0.1);
        },
        playCrash() {
            if (!sfxEnabled || !this.ctx) return;
            const bufferSize = this.ctx.sampleRate * 0.5;
            const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            
            const noise = this.ctx.createBufferSource();
            noise.buffer = buffer;
            const filter = this.ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, this.ctx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 0.5);
            
            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(this.ctx.destination);
            noise.start();
        },
        toggleBGM(play) {
            if (!this.ctx) return;
            if (play && bgmEnabled && state === 'PLAYING') {
                this.bgmGain.gain.setTargetAtTime(0.08, this.ctx.currentTime, 0.5);
            } else {
                this.bgmGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.5);
            }
        }
    };

    // --- Initialization & Resizing ---
    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        roadWidth = width * ROAD_WIDTH_RATIO;
        roadLeft = (width - roadWidth) / 2;
        laneWidth = roadWidth / 5;
        
        bike.w = laneWidth * 0.55;
        bike.h = bike.w * 2;
        bike.y = height * 0.70; 
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Inputs & Controls ---
    function requestPermissionsAndStart() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(permissionState => {
                if (permissionState === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
                startGame();
            }).catch(console.error);
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
            startGame();
        }
    }

    function handleOrientation(e) {
        if (state !== 'PLAYING' || controlMode !== 'TILT') return;
        let tilt = e.gamma || 0;
        if (tilt < -30) tilt = -30;
        if (tilt > 30) tilt = 30;

        if (tilt < -15) bike.lane = 0;
        else if (tilt < -5) bike.lane = 1;
        else if (tilt < 5) bike.lane = 2;
        else if (tilt < 15) bike.lane = 3;
        else bike.lane = 4;
    }

    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');
    function moveLeft(e) { e.preventDefault(); e.stopPropagation(); if (state === 'PLAYING') bike.lane = Math.max(0, bike.lane - 1); }
    function moveRight(e) { e.preventDefault(); e.stopPropagation(); if (state === 'PLAYING') bike.lane = Math.min(4, bike.lane + 1); }
    btnLeft.addEventListener('touchstart', moveLeft, {passive: false});
    btnLeft.addEventListener('mousedown', moveLeft);
    btnRight.addEventListener('touchstart', moveRight, {passive: false});
    btnRight.addEventListener('mousedown', moveRight);

    const handleStart = (e) => { if(e.target === canvas) { isAccelerating = true; e.preventDefault(); }};
    const handleEnd = (e) => { if(e.target === canvas) { isAccelerating = false; e.preventDefault(); }};
    window.addEventListener('touchstart', handleStart, {passive: false});
    window.addEventListener('touchend', handleEnd, {passive: false});
    window.addEventListener('mousedown', handleStart);
    window.addEventListener('mouseup', handleEnd);

    document.getElementById('controls-toggle').addEventListener('change', (e) => {
        controlMode = e.target.checked ? 'TILT' : 'BUTTONS';
        document.getElementById('control-label').innerText = controlMode;
    });
    document.getElementById('sfx-toggle').addEventListener('change', (e) => sfxEnabled = e.target.checked);
    document.getElementById('bgm-toggle').addEventListener('change', (e) => {
        bgmEnabled = e.target.checked;
        AudioSys.toggleBGM(bgmEnabled);
    });

    // --- Core Game Functions ---
    function startGame() {
        AudioSys.init();
        if (AudioSys.ctx.state === 'suspended') AudioSys.ctx.resume();
        
        state = 'PLAYING';
        score = 0;
        baseSpeed = minBaseSpeed;
        speed = 0;
        isAccelerating = false;
        bike.lane = 2;
        bike.lean = 0;
        bike.x = roadLeft + bike.lane * laneWidth + (laneWidth - bike.w) / 2;
        
        obstacles = [];
        scenery = [];
        lastTime = performance.now();
        
        menuScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        hud.classList.remove('hidden');

        if (controlMode === 'BUTTONS') {
            steeringBtns.classList.remove('hidden');
            controlsHint.innerHTML = "Tap Arrows to Steer<br>Hold Screen to Accelerate";
        } else {
            steeringBtns.classList.add('hidden');
            controlsHint.innerHTML = "Tilt Phone to Steer<br>Hold Screen to Accelerate";
        }
        
        AudioSys.toggleBGM(true);
        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        state = 'GAMEOVER';
        shakeTime = 30;
        AudioSys.playCrash();
        AudioSys.updateEngine(0);
        AudioSys.toggleBGM(false);

        if (score > highScore) {
            highScore = score;
            localStorage.setItem('bikeHighScore', highScore);
        }

        hud.classList.add('hidden');
        steeringBtns.classList.add('hidden');
        gameOverScreen.classList.remove('hidden');
        finalScoreEl.innerText = Math.floor(score);
        finalHiScoreEl.innerText = Math.floor(highScore);
        hiScoreEl.innerText = Math.floor(highScore);
    }

    // --- Entity Spawning ---
    function spawnObstacle() {
        const w = laneWidth * 0.7;
        const h = w * 1.8;
        
        // Smart Traffic Algorithm: Ensure at least one lane is always open
        const dangerZone = h * 3; 
        const recentCars = obstacles.filter(c => c.y < dangerZone);
        const blockedLanes = recentCars.map(c => c.lane);
        
        let availableLanes = [0, 1, 2, 3, 4].filter(l => !blockedLanes.includes(l));
        
        // If 4 lanes are already blocked, force an open gap to ensure playability
        if (availableLanes.length <= 1) return;

        // Choose a random available lane
        const lane = availableLanes[Math.floor(Math.random() * availableLanes.length)];

        const colors = ['#f39c12', '#9b59b6', '#3498db', '#ecf0f1', '#e67e22', '#1abc9c'];
        obstacles.push({
            lane: lane,
            x: roadLeft + lane * laneWidth + (laneWidth - w) / 2,
            y: -h,
            w: w,
            h: h,
            color: colors[Math.floor(Math.random() * colors.length)],
            speedModifier: Math.random() * 0.3 + 0.5 
        });
    }

    function spawnScenery() {
        const isLeft = Math.random() > 0.5;
        const size = Math.random() * 30 + 20;
        const x = isLeft ? Math.random() * (roadLeft - size) : roadLeft + roadWidth + Math.random() * (width - roadLeft - roadWidth - size);
        const types = ['tree', 'rock', 'house'];
        scenery.push({
            x: x, y: -size * 2, size: size,
            type: types[Math.floor(Math.random() * types.length)],
            color: Math.random() > 0.5 ? '#27ae60' : '#2ecc71'
        });
    }

    // --- Update Logic ---
    let obstacleTimer = 0;
    let sceneryTimer = 0;

    function update(dt) {
        if (state !== 'PLAYING') return;

        baseSpeed = Math.min(maxBaseSpeed, baseSpeed + dt * 0.05); 
        const targetSpeed = baseSpeed + (isAccelerating ? 12 : 0);
        speed += (targetSpeed - speed) * 0.15; 

        score += speed * dt * 2;
        scoreEl.innerText = Math.floor(score);

        const speedKmh = Math.floor(speed * 9);
        speedText.innerText = `${speedKmh} km/h`;
        const angle = -130 + (speedKmh / 300) * 260; 
        speedNeedle.style.transform = `translateX(-50%) rotate(${angle}deg)`;
        
        AudioSys.updateEngine(speed);

        bike.targetX = roadLeft + bike.lane * laneWidth + (laneWidth - bike.w) / 2;
        const steerDiff = bike.targetX - bike.x;
        
        bike.x += steerDiff * (dt * 8); 
        
        bike.lean = steerDiff * 0.15; 
        bike.lean = Math.max(-25, Math.min(25, bike.lean)); 

        laneOffset += speed * 0.5;
        if (laneOffset > 40) laneOffset = 0;

        // Increased spawn rate significantly (timer lowered from 20 to 8)
        obstacleTimer += speed * dt;
        if (obstacleTimer > 8) {
            spawnObstacle();
            obstacleTimer = 0;
        }

        sceneryTimer += speed * dt;
        if (sceneryTimer > 50) {
            spawnScenery();
            sceneryTimer = 0;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.y += speed * obs.speedModifier * dt * 50;
            
            let hitMargin = 5;
            if (bike.x + hitMargin < obs.x + obs.w - hitMargin &&
                bike.x + bike.w - hitMargin > obs.x + hitMargin &&
                bike.y + hitMargin < obs.y + obs.h - hitMargin &&
                bike.y + bike.h - hitMargin > obs.y + hitMargin) {
                gameOver();
            }

            if (obs.y > height) obstacles.splice(i, 1);
        }

        for (let i = scenery.length - 1; i >= 0; i--) {
            let sc = scenery[i];
            sc.y += speed * dt * 50;
            if (sc.y > height) scenery.splice(i, 1);
        }
    }

    // --- Drawing Logic ---
    function draw() {
        ctx.fillStyle = '#55a630'; 
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        if (shakeTime > 0) {
            const dx = (Math.random() - 0.5) * 20;
            const dy = (Math.random() - 0.5) * 20;
            ctx.translate(dx, dy);
            shakeTime--;
        }

        ctx.fillStyle = '#7f8c8d';
        ctx.fillRect(roadLeft, 0, roadWidth, height);
        
        ctx.fillStyle = '#ecf0f1';
        ctx.fillRect(roadLeft - 5, 0, 5, height);
        ctx.fillRect(roadLeft + roadWidth, 0, 5, height);

        ctx.strokeStyle = '#bdc3c7';
        ctx.lineWidth = 4;
        ctx.setLineDash([20, 20]);
        ctx.lineDashOffset = -laneOffset;
        for (let i = 1; i < 5; i++) {
            ctx.beginPath();
            ctx.moveTo(roadLeft + i * laneWidth, 0);
            ctx.lineTo(roadLeft + i * laneWidth, height);
            ctx.stroke();
        }
        ctx.setLineDash([]);

        scenery.forEach(sc => {
            if (sc.type === 'tree') {
                ctx.fillStyle = '#8e44ad'; 
                ctx.fillRect(sc.x + sc.size*0.4, sc.y + sc.size*0.5, sc.size*0.2, sc.size*0.5);
                ctx.fillStyle = sc.color;
                ctx.beginPath();
                ctx.arc(sc.x + sc.size/2, sc.y + sc.size/2, sc.size/2, 0, Math.PI * 2);
                ctx.fill();
            } else if (sc.type === 'rock') {
                ctx.fillStyle = '#95a5a6';
                ctx.beginPath();
                ctx.moveTo(sc.x, sc.y + sc.size);
                ctx.lineTo(sc.x + sc.size/2, sc.y);
                ctx.lineTo(sc.x + sc.size, sc.y + sc.size);
                ctx.fill();
            } else {
                ctx.fillStyle = '#c0392b';
                ctx.beginPath();
                ctx.moveTo(sc.x, sc.y + sc.size*0.4);
                ctx.lineTo(sc.x + sc.size/2, sc.y);
                ctx.lineTo(sc.x + sc.size, sc.y + sc.size*0.4);
                ctx.fill();
                ctx.fillStyle = '#ecf0f1';
                ctx.fillRect(sc.x + sc.size*0.1, sc.y + sc.size*0.4, sc.size*0.8, sc.size*0.6);
            }
        });

        obstacles.forEach(obs => {
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(obs.x + 5, obs.y + 5, obs.w, obs.h);
            
            ctx.fillStyle = obs.color;
            ctx.beginPath();
            ctx.roundRect(obs.x, obs.y, obs.w, obs.h, 5);
            ctx.fill();
            
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(obs.x + 4, obs.y + obs.h*0.2, obs.w - 8, obs.h*0.2); 
            ctx.fillRect(obs.x + 4, obs.y + obs.h*0.7, obs.w - 8, obs.h*0.15); 
        });

        // Player Bike (Using Detailed Sprite)
        if (state !== 'GAMEOVER' || shakeTime % 4 < 2) { 
            ctx.save();
            ctx.translate(bike.x + bike.w/2, bike.y + bike.h/2);
            ctx.rotate(bike.lean * Math.PI / 180);
            
            let bx = -bike.w/2;
            let by = -bike.h/2;

            // Draw Pre-rendered Detailed Sprite
            ctx.drawImage(bikeSprite, bx, by, bike.w, bike.h);
            
            // Draw Dynamic Exhaust Flames when Accelerating
            if (isAccelerating) {
                const flameLength = 10 + Math.random() * 15;
                ctx.fillStyle = '#f39c12';
                // Right Flame
                ctx.beginPath();
                ctx.moveTo(bx + bike.w*0.75, by + bike.h);
                ctx.lineTo(bx + bike.w*0.80, by + bike.h + flameLength);
                ctx.lineTo(bx + bike.w*0.85, by + bike.h);
                ctx.fill();
                // Left Flame
                ctx.beginPath();
                ctx.moveTo(bx + bike.w*0.15, by + bike.h);
                ctx.lineTo(bx + bike.w*0.20, by + bike.h + flameLength);
                ctx.lineTo(bx + bike.w*0.25, by + bike.h);
                ctx.fill();
            }
            ctx.restore();
        }

        ctx.restore();
    }

    // --- Main Loop ---
    function gameLoop(timestamp) {
        let dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;
        if (dt > 0.1) dt = 0.1; 

        update(dt);
        draw();

        if (state === 'PLAYING' || shakeTime > 0) {
            requestAnimationFrame(gameLoop);
        }
    }

    // --- Button Listeners ---
    document.getElementById('btn-play').addEventListener('click', requestPermissionsAndStart);
    document.getElementById('btn-retry').addEventListener('click', requestPermissionsAndStart);
    document.getElementById('btn-menu').addEventListener('click', () => {
        state = 'MENU';
        gameOverScreen.classList.add('hidden');
        menuScreen.classList.remove('hidden');
        ctx.fillStyle = '#2c3e50';
        ctx.fillRect(0,0,width,height);
    });

    // Initial render
    ctx.fillStyle = '#2c3e50';
    ctx.fillRect(0,0,width,height);

</script>
</body>
</html>
